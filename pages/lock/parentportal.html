<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Admin Panel</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1350px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 22px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .logout-btn {
            background: rgba(255,255,255,.16);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: .2s;
        }

        .logout-btn:hover { transform: translateY(-2px); }

        .auth-section {
            min-height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 8px 22px rgba(0,0,0,.08);
            margin-bottom: 20px;
        }

        .card h2 {
            margin-bottom: 18px;
            color: #111827;
        }

        .form-group { margin-bottom: 14px; }

        .form-group input, .search-input, .filter-select {
            width: 100%;
            padding: 13px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        .form-group input:focus, .search-input:focus, .filter-select:focus {
            border-color: #667eea;
        }

        .btn-primary, .btn-success, .btn-danger, .btn-warning, .btn-info, .btn-secondary {
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: .2s;
        }

        .btn-primary {
            width: 100%;
            padding: 13px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success { background: #10b981; }
        .btn-danger { background: #ef4444; }
        .btn-warning { background: #f59e0b; }
        .btn-info { background: #3b82f6; }
        .btn-secondary { background: #6b7280; }

        .btn-primary:hover, .btn-success:hover, .btn-danger:hover,
        .btn-warning:hover, .btn-info:hover, .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-link {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            font-size: 14px;
        }

        .dashboard-wrap { padding: 0 24px 24px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            padding: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            opacity: .92;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 30px;
            font-weight: 700;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .toolbar-left, .toolbar-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input { min-width: 250px; }
        .filter-select { min-width: 180px; }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 18px;
            margin-top: 16px;
        }

        .device-card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 20px;
            border-left: 5px solid #10b981;
            transition: .2s;
        }

        .device-card.not-managed {
            border-left-color: #ef4444;
            background: #fff7f7;
        }

        .device-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(0,0,0,.08);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .device-name {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
        }

        .status-chip {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: white;
        }

        .status-online { background: #10b981; }
        .status-offline { background: #9ca3af; }
        .status-pending { background: #f59e0b; }
        .status-done { background: #10b981; }
        .status-failed { background: #ef4444; }

        .device-info {
            font-size: 13px;
            line-height: 1.8;
            color: #374151;
            margin-bottom: 16px;
        }

        .device-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .activity-log {
            max-height: 450px;
            overflow-y: auto;
            background: #f8fafc;
            border-radius: 14px;
            padding: 14px;
        }

        .log-entry {
            padding: 12px 10px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .log-left {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .log-time {
            color: #6b7280;
            font-size: 12px;
        }

        .log-action {
            font-weight: 700;
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            z-index: 9999;
            box-shadow: 0 10px 22px rgba(0,0,0,.18);
        }

        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #3b82f6; }

        .loading, .empty-state {
            text-align: center;
            color: #6b7280;
            padding: 24px;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .stats-grid { grid-template-columns: 1fr; padding: 18px; }
            .devices-grid { grid-template-columns: 1fr; }
            .device-actions { flex-direction: column; }
            .device-actions button { width: 100%; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-left, .toolbar-right { width: 100%; }
            .search-input, .filter-select { width: 100%; min-width: auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1> Admin Panel</h1>
        <button id="logoutBtn" class="logout-btn" style="display:none;">🚪 Logout</button>
    </div>

    <!-- AUTH -->
    <div id="authSection">
        <div class="auth-section">
            <div class="card" style="max-width: 420px; width:100%;">
                <h2 style="text-align:center;">🔐 Admin Login</h2>

                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="email" placeholder="Email address" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary">🔑 Login</button>
                </form>

                <button id="showRegisterBtn" class="btn-link">📝 Create new admin account</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardSection" style="display:none;">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>📱 Total Devices</h3>
                <p id="totalDevices">0</p>
            </div>
            <div class="stat-card">
                <h3>🛡️ Managed Devices</h3>
                <p id="managedDevices">0</p>
            </div>
            <div class="stat-card">
                <h3>✅ Online Now</h3>
                <p id="onlineDevices">0</p>
            </div>
            <div class="stat-card">
                <h3>⏳ Pending Commands</h3>
                <p id="pendingCommands">0</p>
            </div>
        </div>

        <div class="dashboard-wrap">
            <div class="card">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button id="refreshBtn" class="btn-success">↻ Refresh</button>
                        <button id="clearOldCommandsBtn" class="btn-secondary">🧹 Clear Processed</button>
                    </div>
                    <div class="toolbar-right">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search device name / ID / model">
                        <select id="filterSelect" class="filter-select">
                            <option value="all">All Devices</option>
                            <option value="online">Online</option>
                            <option value="offline">Offline</option>
                            <option value="managed">Managed</option>
                            <option value="not-managed">Not Managed</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>📱 Registered Devices</h2>
                <div id="devicesList" class="devices-grid">
                    <div class="loading">Loading devices...</div>
                </div>
            </div>

            <div class="card">
                <h2>📋 Recent Commands / Activity</h2>
                <div id="activityLog" class="activity-log">
                    <div class="loading">Loading activity...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
      const firebaseConfig = {
            apiKey: "AIzaSyAbAkSQQ9NQlSap_jixWsnCVo6uG_WOXF4",
            authDomain: "locksystem-f0971.firebaseapp.com",
            projectId: "locksystem-f0971",
            storageBucket: "locksystem-f0971.firebasestorage.app",
            messagingSenderId: "141649865581",
            appId: "1:141649865581:web:fe4742dd6deb99981dc864",
            measurementId: "G-MVZ9JELPF3"
        };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUser = null;
    let unsubscribeDevices = null;
    let unsubscribeCommands = null;

    let devicesState = new Map();
    let commandsState = [];

    const authSection = document.getElementById("authSection");
    const dashboardSection = document.getElementById("dashboardSection");
    const loginForm = document.getElementById("loginForm");
    const logoutBtn = document.getElementById("logoutBtn");
    const showRegisterBtn = document.getElementById("showRegisterBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const clearOldCommandsBtn = document.getElementById("clearOldCommandsBtn");
    const devicesList = document.getElementById("devicesList");
    const activityLog = document.getElementById("activityLog");
    const searchInput = document.getElementById("searchInput");
    const filterSelect = document.getElementById("filterSelect");

    function showToast(message, type = "info") {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    function formatDate(timestamp) {
        if (!timestamp) return "Never";
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        const diff = Date.now() - date.getTime();
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);

        if (minutes < 1) return "Just now";
        if (minutes < 60) return `${minutes} min ago`;
        if (hours < 24) return `${hours} hr ago`;
        if (days < 7) return `${days} day ago`;
        return date.toLocaleString();
    }

    function getLastSeen(device) {
        return device.lastSeen || device.updatedAt || null;
    }

    function isOnline(device) {
        const lastSeen = getLastSeen(device);
        if (!lastSeen) return false;
        const date = lastSeen.toDate ? lastSeen.toDate() : new Date(lastSeen);
        return ((Date.now() - date.getTime()) / 60000) < 7;
    }

    function getDeviceTitle(device, id) {
        return device.deviceName || device.model || device.deviceId || id;
    }

    function getCommandStatusClass(status) {
        if (status === "done") return "status-done";
        if (status === "failed") return "status-failed";
        return "status-pending";
    }

    async function isAuthorizedAdmin(uid) {
        try {
            const doc = await db.collection("admins").doc(uid).get();
            return doc.exists && doc.data()?.active === true;
        } catch {
            return false;
        }
    }

    function setupAuthStateListener() {
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                currentUser = null;
                authSection.style.display = "block";
                dashboardSection.style.display = "none";
                logoutBtn.style.display = "none";

                if (unsubscribeDevices) unsubscribeDevices();
                if (unsubscribeCommands) unsubscribeCommands();

                devicesState.clear();
                commandsState = [];
                devicesList.innerHTML = `<div class="loading">Loading devices...</div>`;
                activityLog.innerHTML = `<div class="loading">Loading activity...</div>`;
                updateStats([]);
                return;
            }

            const allowed = await isAuthorizedAdmin(user.uid);
            if (!allowed) {
                await auth.signOut();
                showToast("Admin not approved in Firestore admins collection", "error");
                return;
            }

            currentUser = user;
            authSection.style.display = "none";
            dashboardSection.style.display = "block";
            logoutBtn.style.display = "inline-block";

            showToast(`Welcome ${user.email}`, "success");

            subscribeDevices();
            subscribeCommands();
        });
    }

    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        try {
            await auth.signInWithEmailAndPassword(email, password);
            loginForm.reset();
        } catch (error) {
            showToast("Login failed: " + error.message, "error");
        }
    });

    showRegisterBtn.addEventListener("click", async () => {
        const email = prompt("Enter admin email:");
        if (!email) return;

        const password = prompt("Enter password (minimum 6 chars):");
        if (!password || password.length < 6) {
            showToast("Password must be at least 6 characters", "error");
            return;
        }

        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            alert(
                `Account created.\n\nNow create Firestore document:\nadmins/${cred.user.uid}\n\nFields:\nactive = true\nrole = admin\nemail = ${email}`
            );
            showToast("Account created successfully", "success");
        } catch (error) {
            showToast("Registration failed: " + error.message, "error");
        }
    });

    logoutBtn.addEventListener("click", async () => {
        await auth.signOut();
        showToast("Logged out", "info");
    });

    async function queueDeviceCommand(deviceId, action, extra = {}) {
        if (!currentUser) {
            showToast("Please login first", "error");
            return;
        }

        const ok = confirm(`Send command "${action}" to device?\n\nDevice ID: ${deviceId}`);
        if (!ok) return;

        try {
            await db.collection("commands").add({
                deviceId,
                action,
                value: extra.value || "",
                token: extra.token || "",
                newPin: extra.newPin || "",
                status: "pending",
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdByUid: currentUser.uid,
                createdByEmail: currentUser.email || "",
                source: "web_admin"
            });

            showToast(`Queued: ${action}`, "success");
        } catch (error) {
            showToast("Command failed: " + error.message, "error");
        }
    }

    async function handleDeviceAction(deviceId, action) {
        if (!deviceId) return;

        if (action === "SET_LOST_MESSAGE") {
            const value = prompt("Enter lock screen message:");
            if (!value) return;
            await queueDeviceCommand(deviceId, action, { value });
            return;
        }

        if (action === "RESET_PIN") {
            const token = prompt("Enter Base64 reset token:");
            if (!token) return;
            const newPin = prompt("Enter new PIN:");
            if (!newPin) return;
            await queueDeviceCommand(deviceId, action, { token, newPin });
            return;
        }

        if (action === "CLEAR_PIN") {
            const token = prompt("Enter Base64 reset token:");
            if (!token) return;
            await queueDeviceCommand(deviceId, action, { token });
            return;
        }

        await queueDeviceCommand(deviceId, action);
    }

    async function removeDeviceRecord(deviceId) {
        const ok = confirm(`Delete Firestore record for device ${deviceId}?`);
        if (!ok) return;

        try {
            await db.collection("devices").doc(deviceId).delete();
            showToast(`Deleted device record: ${deviceId}`, "success");
        } catch (error) {
            showToast("Delete failed: " + error.message, "error");
        }
    }

    async function clearProcessedCommands() {
        if (!confirm("Delete all done/failed commands?")) return;

        try {
            const snap = await db.collection("commands")
                .where("status", "in", ["done", "failed"])
                .get();

            if (snap.empty) {
                showToast("No processed commands found", "info");
                return;
            }

            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();

            showToast(`Deleted ${snap.size} processed commands`, "success");
        } catch (error) {
            showToast("Clear failed: " + error.message, "error");
        }
    }

    clearOldCommandsBtn.addEventListener("click", clearProcessedCommands);

    function updateStats(devices) {
        document.getElementById("totalDevices").textContent = devices.length;
        document.getElementById("managedDevices").textContent = devices.filter(d => !!d.isDeviceOwner).length;
        document.getElementById("onlineDevices").textContent = devices.filter(d => isOnline(d)).length;
        document.getElementById("pendingCommands").textContent = commandsState.filter(c => c.status === "pending").length;
    }

    function renderDevices() {
        let devices = [...devicesState.values()];

        const query = searchInput.value.trim().toLowerCase();
        const filter = filterSelect.value;

        if (query) {
            devices = devices.filter(d => {
                const id = (d.id || "").toLowerCase();
                const name = (getDeviceTitle(d, d.id) || "").toLowerCase();
                const model = (d.model || "").toLowerCase();
                return id.includes(query) || name.includes(query) || model.includes(query);
            });
        }

        if (filter === "online") devices = devices.filter(isOnline);
        if (filter === "offline") devices = devices.filter(d => !isOnline(d));
        if (filter === "managed") devices = devices.filter(d => !!d.isDeviceOwner);
        if (filter === "not-managed") devices = devices.filter(d => !d.isDeviceOwner);

        devices.sort((a, b) => {
            const aTime = getLastSeen(a);
            const bTime = getLastSeen(b);
            const aMs = aTime ? (aTime.toDate ? aTime.toDate().getTime() : new Date(aTime).getTime()) : 0;
            const bMs = bTime ? (bTime.toDate ? bTime.toDate().getTime() : new Date(bTime).getTime()) : 0;
            return bMs - aMs;
        });

        if (!devices.length) {
            devicesList.innerHTML = `<div class="empty-state">📭 No devices found</div>`;
            updateStats([]);
            return;
        }

        devicesList.innerHTML = devices.map(device => {
            const online = isOnline(device);
            const managed = !!device.isDeviceOwner;
            const lastSeen = formatDate(getLastSeen(device));

            return `
                <div class="device-card ${managed ? "" : "not-managed"}">
                    <div class="device-header">
                        <span class="device-name">${escapeHtml(getDeviceTitle(device, device.id))}</span>
                        <span class="status-chip ${online ? "status-online" : "status-offline"}">
                            ${online ? "Online" : "Offline"}
                        </span>
                    </div>

                    <div class="device-info">
                        <div><strong>Device ID:</strong> ${escapeHtml(device.id)}</div>
                        <div><strong>Model:</strong> ${escapeHtml(device.model || "-")}</div>
                        <div><strong>Brand:</strong> ${escapeHtml(device.brand || "-")}</div>
                        <div><strong>Android:</strong> ${escapeHtml(device.androidVersion || "-")} (SDK ${escapeHtml(String(device.sdkInt || "-"))})</div>
                        <div><strong>Device Owner:</strong> ${managed ? "Yes" : "No"}</div>
                        <div><strong>Admin Active:</strong> ${device.isAdminActive ? "Yes" : "No"}</div>
                        <div><strong>Last Seen:</strong> ${lastSeen}</div>
                        <div><strong>Last Command:</strong> ${escapeHtml(device.lastCommand || "-")}</div>
                    </div>

                    <div class="device-actions">
                        <button class="btn-danger cmd-btn" data-device-id="${device.id}" data-action="LOCK_DEVICE">🔒 Lock</button>
                        <button class="btn-warning cmd-btn" data-device-id="${device.id}" data-action="ENTER_KIOSK">📌 Enter Kiosk</button>
                        <button class="btn-success cmd-btn" data-device-id="${device.id}" data-action="EXIT_KIOSK">🚪 Exit Kiosk</button>
                        <button class="btn-info cmd-btn" data-device-id="${device.id}" data-action="SET_LOST_MESSAGE">💬 Lost Msg</button>
                        <button class="btn-warning cmd-btn" data-device-id="${device.id}" data-action="RESET_PIN">🔐 Reset PIN</button>
                        <button class="btn-success cmd-btn" data-device-id="${device.id}" data-action="CLEAR_PIN">🧹 Clear PIN</button>
                        <button class="btn-secondary delete-btn" data-device-id="${device.id}">🗑 Delete</button>
                    </div>
                </div>
            `;
        }).join("");

        updateStats([...devicesState.values()]);
    }

    function renderCommands() {
        if (!commandsState.length) {
            activityLog.innerHTML = `<div class="empty-state">📝 No activity yet</div>`;
            return;
        }

        activityLog.innerHTML = commandsState.map(item => `
            <div class="log-entry">
                <div class="log-left">
                    <span class="log-time">${formatDate(item.createdAt || item.timestamp)}</span>
                    <span class="log-action">${escapeHtml(item.action || "COMMAND")}</span>
                    <span>Device: ${escapeHtml(item.deviceId || "-")}</span>
                </div>
                <div>
                    <span class="status-chip ${getCommandStatusClass(item.status)}">${escapeHtml(item.status || "pending")}</span>
                </div>
            </div>
        `).join("");

        updateStats([...devicesState.values()]);
    }

    function subscribeDevices() {
        if (unsubscribeDevices) unsubscribeDevices();

        unsubscribeDevices = db.collection("devices").onSnapshot(snapshot => {
            snapshot.forEach(doc => {
                devicesState.set(doc.id, { id: doc.id, ...(doc.data() || {}) });
            });
            renderDevices();
        }, error => {
            console.error(error);
            devicesList.innerHTML = `<div class="empty-state">❌ Error loading devices</div>`;
        });
    }

    function subscribeCommands() {
        if (unsubscribeCommands) unsubscribeCommands();

        unsubscribeCommands = db.collection("commands")
            .orderBy("createdAt", "desc")
            .limit(50)
            .onSnapshot(snapshot => {
                commandsState = snapshot.docs.map(doc => ({ id: doc.id, ...(doc.data() || {}) }));
                renderCommands();
            }, error => {
                console.error(error);
                activityLog.innerHTML = `<div class="empty-state">❌ Error loading commands</div>`;
            });
    }

    devicesList.addEventListener("click", async (e) => {
        const cmdBtn = e.target.closest(".cmd-btn");
        const deleteBtn = e.target.closest(".delete-btn");

        if (cmdBtn) {
            const deviceId = cmdBtn.dataset.deviceId;
            const action = cmdBtn.dataset.action;
            await handleDeviceAction(deviceId, action);
        }

        if (deleteBtn) {
            const deviceId = deleteBtn.dataset.deviceId;
            await removeDeviceRecord(deviceId);
        }
    });

    refreshBtn.addEventListener("click", () => {
        renderDevices();
        renderCommands();
        showToast("Realtime view refreshed", "info");
    });

    searchInput.addEventListener("input", renderDevices);
    filterSelect.addEventListener("change", renderDevices);

    setupAuthStateListener();
</script>
</body>
</html>
