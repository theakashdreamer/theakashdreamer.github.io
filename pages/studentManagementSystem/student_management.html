<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManage Pro - Student Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="text-slate-800 antialiased overflow-hidden flex h-screen">

    <!-- Global App Container -->
    <div id="app" class="flex w-full h-full w-full">
        <!-- Animated Loading State -->
        <div class="flex-1 flex flex-col items-center justify-center h-full bg-slate-50">
            <div class="relative w-24 h-24 mb-8">
                <!-- Pulsing outer ring -->
                <div class="absolute inset-0 bg-blue-400 rounded-full animate-ping opacity-20"></div>
                <!-- Track ring -->
                <div class="absolute inset-0 border-4 border-slate-200 rounded-full"></div>
                <!-- Spinning gradient ring -->
                <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin">
                </div>
                <!-- Center Logo -->
                <div class="absolute inset-0 flex items-center justify-center bg-white rounded-full shadow-md z-10 m-2">
                    <i data-lucide="graduation-cap" class="w-8 h-8 text-blue-600"></i>
                </div>
            </div>

            <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-2">EduManage Pro</h2>
            <div class="flex items-center gap-2 text-sm font-medium text-slate-500">
                <span>Connecting to Secure Environment</span>
                <span class="flex gap-1 items-center justify-center mt-1">
                    <span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce"
                        style="animation-delay: 0ms"></span>
                    <span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce"
                        style="animation-delay: 150ms"></span>
                    <span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce"
                        style="animation-delay: 300ms"></span>
                </span>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- App Logic -->
    <script type="module" src="js/app.js"></script>

</body>

</html>
